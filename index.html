<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div id="loginPage" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg w-96 shadow">
            <h1 class="text-2xl font-bold text-center mb-2">GitHub Issues Tracker</h1>
            <p class="text-center text-gray-500 mb-6">Sign in to manage your issues</p>
            <input id="username" class="w-full border p-2 mb-3 rounded" placeholder="Username">
            <input id="password" type="password" class="w-full border p-2 mb-3 rounded" placeholder="Password">
            <button onclick="login()" class="w-full bg-purple-600 text-white py-2 rounded">Sign In</button>
            <div class="text-center text-sm mt-4 bg-gray-100 p-3 rounded">
                <p>Username: admin</p>
                <p>Password: admin123</p>
            </div>
        </div>
    </div>
    <div id="app" class="hidden">

        <nav class="bg-white shadow p-4 flex justify-between items-center">
            <h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
            <div class="flex gap-2">
                <input id="searchInput" class="border p-2 rounded" placeholder="Search issues">
                <button onclick="searchIssues()" class="bg-purple-600 text-white px-4 rounded">Search</button>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto p-4">

            <div class="flex gap-2 mb-4">
                <button onclick="loadIssues('all')" id="tabAll" class="tab bg-purple-600 text-white px-4 py-2 rounded">All</button>
                <button onclick="loadIssues('open')" id="tabOpen" class="tab border px-4 py-2 rounded">Open</button>
                <button onclick="loadIssues('closed')" id="tabClosed" class="tab border px-4 py-2 rounded">Closed</button>
            </div>

            <div class="flex justify-between items-center mb-4">
                <div>
                    <p class="font-semibold"><span id="issueCount">0</span> Issues</p>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
                <div class="text-sm">
                    <span class="text-green-600">● Open</span>
                    <span class="text-purple-600 ml-4">● Closed</span>
                </div>
            </div>

            <div id="spinner" class="text-center hidden">
                <p class="text-lg">Loading...</p>
            </div>

            <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>

        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">
        <div class="bg-white p-6 rounded w-96">
            <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>
            <p id="modalDesc" class="text-gray-600 mb-3"></p>
            <p class="text-sm">Author: <span id="modalAuthor"></span></p>
            <p class="text-sm">Priority: <span id="modalPriority"></span></p>
            <p class="text-sm">Created: <span id="modalDate"></span></p>
            <button onclick="closeModal()" class="mt-4 bg-purple-600 text-white px-4 py-2 rounded w-full">Close</button>
        </div>
    </div>

    <script>
        const API = "https://phi-lab-server.vercel.app/api/v1/lab/issues"
        let issues = []

        function login() {
            let u = document.getElementById("username").value
            let p = document.getElementById("password").value
            if (u === "admin" && p === "admin123") {
                document.getElementById("loginPage").classList.add("hidden")
                document.getElementById("app").classList.remove("hidden")
                loadIssues("all")
            } else {
                alert("Invalid credentials")
            }
        }

        async function loadIssues(type) {
            setActiveTab(type)
            document.getElementById("spinner").classList.remove("hidden")
            let res = await fetch(API)
            let data = await res.json()
            issues = data.data || data
            displayIssues(type === "all" ? issues : issues.filter(i => i.status === type))
            document.getElementById("spinner").classList.add("hidden")
        }

        function displayIssues(list) {
            let container = document.getElementById("issuesContainer")
            container.innerHTML = ""
            document.getElementById("issueCount").innerText = list.length
            list.forEach(i => {
                let border = i.status === "open" ? "border-green-500" : "border-purple-500"
                container.innerHTML += `
<div onclick="openModal(${i.id})" class="cursor-pointer bg-white p-4 rounded shadow border-t-4 ${border}">
<h3 class="font-semibold mb-1">${i.title}</h3>
<p class="text-sm text-gray-500 mb-2">${i.description}</p>
<p class="text-xs text-gray-600">#${i.id} by ${i.author}</p>
<p class="text-xs text-gray-500">${new Date(i.createdAt).toLocaleDateString()}</p>
</div>`
            })
        }

        function openModal(id) {
            let issue = issues.find(i => i.id === id)
            document.getElementById("modalTitle").innerText = issue.title
            document.getElementById("modalDesc").innerText = issue.description
            document.getElementById("modalAuthor").innerText = issue.author
            document.getElementById("modalPriority").innerText = issue.priority
            document.getElementById("modalDate").innerText = new Date(issue.createdAt).toLocaleDateString()
            document.getElementById("modal").classList.remove("hidden")
            document.getElementById("modal").classList.add("flex")
        }
