<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div id="loginPage" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg w-96 shadow">
            <h1 class="text-2xl font-bold text-center mb-2">GitHub Issues Tracker</h1>
            <p class="text-center text-gray-500 mb-6">Sign in to manage your issues</p>
            <input id="username" class="w-full border p-2 mb-3 rounded" placeholder="Username">
            <input id="password" type="password" class="w-full border p-2 mb-3 rounded" placeholder="Password">
            <button onclick="login()" class="w-full bg-purple-600 text-white py-2 rounded">Sign In</button>
            <div class="text-center text-sm mt-4 bg-gray-100 p-3 rounded">
                <p>Username: admin</p>
                <p>Password: admin123</p>
            </div>
        </div>
    </div>
    <div id="app" class="hidden">

        <nav class="bg-white shadow p-4 flex justify-between items-center">
            <h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
            <div class="flex gap-2">
                <input id="searchInput" class="border p-2 rounded" placeholder="Search issues">
                <button onclick="searchIssues()" class="bg-purple-600 text-white px-4 rounded">Search</button>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto p-4">

            <div class="flex gap-2 mb-4">
                <button onclick="loadIssues('all')" id="tabAll" class="tab bg-purple-600 text-white px-4 py-2 rounded">All</button>
                <button onclick="loadIssues('open')" id="tabOpen" class="tab border px-4 py-2 rounded">Open</button>
                <button onclick="loadIssues('closed')" id="tabClosed" class="tab border px-4 py-2 rounded">Closed</button>
            </div>
